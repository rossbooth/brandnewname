<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#fafaf8"/>

  <!-- Subtle top and bottom border lines -->
  <line x1="100" y1="80" x2="1100" y2="80" stroke="#1a1a1a" stroke-width="1" opacity="0.15"/>
  <line x1="100" y1="550" x2="1100" y2="550" stroke="#1a1a1a" stroke-width="1" opacity="0.15"/>

  <!-- Brand name -->
  <text x="600" y="295" text-anchor="middle" font-family="'Instrument Serif', Georgia, 'Times New Roman', serif" font-size="88" fill="#1a1a1a" letter-spacing="-1">BrandNewName</text>

  <!-- Thin decorative line -->
  <line x1="540" y1="325" x2="660" y2="325" stroke="#1a1a1a" stroke-width="1.5" opacity="0.4"/>

  <!-- Tagline -->
  <text x="600" y="375" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="28" fill="#1a1a1a" opacity="0.55" letter-spacing="2" font-style="italic">Find your forever name.</text>

  <!-- Small decorative asterisk mark above the title -->
  <text x="600" y="195" text-anchor="middle" font-family="Georgia, serif" font-size="32" fill="#1a1a1a" opacity="0.2">*</text>
</svg>